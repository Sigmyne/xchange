name: GNU make
permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'include/**'
      - 'test/**'
      - 'examples/**'
      - '**/Makefile'
      - '*.mk'
      - '.github/workflows/gnu.yml'

  pull_request:
    paths:
      - 'src/**'
      - 'include/**'
      - 'test/**'
      - 'examples/**'
      - '**/Makefile'
      - '*.mk'
      - '.github/workflows/gnu.yml'

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            cc: gcc
          - os: macos-latest
            cc: clang
    env:
      CC: ${{ matrix.cc }}
      CFLAGS: -Os -Wall -Werror
      CSTANDARD: c99
      WEXTRA: 1
      FORTIFY: 3

    steps:
    - uses: actions/checkout@v7

    - name: Build static library
      run: make static

    - name: Build shared library
      run: make shared

    - name: Build examples
      run: make examples

  build-freebsd:
    name: Build on FreeBSD
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.0"
          prepare: |
            pkg install -y gmake
          run: |
            echo Building on FreeBSD $(uname -m)
            gmake static
            gmake shared
            gmake examples

  build-examples:
    name: Check examples
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: GNU Build examples
        run: make examples

  install:
    name: GNU install (Ubuntu)
    needs: build
    runs-on: ubuntu-latest
    env:
      CC: gcc
    steps:
    - name: install doxygen
      run: sudo apt-get install doxygen

    - uses: actions/checkout@v7

    - name: Build distro
      run: make distro

    - name: Install to default location
      run: sudo make install

  test:
    name: Regression Tests
    needs: build
    runs-on: ubuntu-latest
    env:
      FORTIFY: 3
      LIB: ${{ github.workspace }}/lib
      LD_LIBRARY_PATH: ${{ github.workspace }}/lib
    steps:
    - uses: actions/checkout@v7

    - name: Build and run tests
      run: make test

  test-platforms:
    name: Test Linux arches
    needs: test
    # The host should always be linux
    runs-on: ubuntu-latest

    # Run steps on a matrix of 4 arch/distro combinations
    strategy:
      matrix:
        include:
          - arch: armv7
            distro: ubuntu_latest
          - arch: aarch64
            distro: ubuntu_latest
          - arch: riscv64
            distro: ubuntu_latest
          - arch: s390x
            distro: ubuntu_latest
          - arch: ppc64le
            distro: ubuntu_latest
    steps:
      - uses: actions/checkout@v7
      - uses: uraimo/run-on-arch-action@v3
        name: Run regression tests
        id: test
        with:
          arch: ${{ matrix.arch }}
          distro: ${{ matrix.distro }}
          install: |
            apt-get update -q -y
            apt-get install -q -y make gcc
          run: make test

  test-macos:
    name: Test MacOS
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build and test on macOS
        run: make test
